<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Ollio - UI for Ollama</title>
    <link href="css/style.css" rel="stylesheet" type="text/css" />
    <script defer src="js/script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify/dist/purify.min.js"></script>
    <link rel="shortcut icon" href="favicon.png">
</head>

<body>
    <div class="logo"></div>
    <div class="logoimg"></div>
    <div id="stream" class="stream-div">
        <label>Stream
            <input type="checkbox" id="streamToggle" />
        </label>
    </div>
    <div class="tokensSelect">
        <label>Tokens</label>
        <div id="tokensDropdown" class="dropdown-tokens">
            <div id="selectedTokens" class="dropdown-selected">
                3K
            </div>
            <div id="tokensOptions" class="dropdown-options hidden">
                <div data-value="1024">
                    1K
                </div>
                <div data-value="2048">
                    2K
                </div>
                <div data-value="3072">
                    3K
                </div>
                <div data-value="4096">
                    4K
                </div>
                <div data-value="5120">
                    5K
                </div>
                <div data-value="6144">
                    6K
                </div>
                <div data-value="7168">
                    7K
                </div>
                <div data-value="8192">
                    8K
                </div>
            </div>
        </div>
    </div>
    <div class="modelSelect">
        <label>Model</label>
        <div id="modelDropdown" class="dropdown-model">
            <div id="selectedModel" class="dropdown-selected">
                Loading...
            </div>
            <div id="modelOptions" class="dropdown-options hidden">
            </div>
        </div>
    </div>
    <div class="saved-title">Saved conversations</div>
    <div class="new-conversation">New</div>
    <div class="saved-list"></div>
    <div class="chat-container">
        <div id="chatHistory" class="chat-history"></div>
        <div id="dragHandle" class="drag-handle"></div>
        <div class="input-area">
            <button id="attachBtn">+</button>
            <input type="file" id="fileInput" accept="image/*" style="display:none;">
            <div id="fileName" class="file-name" style="display:none;"></div>
            <textarea id="userInput" placeholder="Type your message…" rows="1"></textarea>
            <button id="sendBtn">Send</button>
        </div>
    </div>
    <div class="info" id="info"></div>
</body>

</html>
